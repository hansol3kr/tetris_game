; Blockfall export presets — starting templates for all target stores.
; Open in the Godot editor (Project > Export) to finish signing/credentials.
; The three desktop presets add a custom "steam" feature tag so the game selects
; the Steam backend at runtime; Android/iOS report "mobile" automatically.

[preset.0]

name="Windows Desktop (Steam)"
platform="Windows Desktop"
runnable=true
custom_features="steam"
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/windows/Blockfall.exe"

[preset.0.options]

binary_format/architecture="x86_64"
application/modify_resources=false
application/product_name="Blockfall"
application/company_name="Your Studio"
application/file_version="1.0.0.0"
application/product_version="1.0.0.0"

[preset.1]

name="macOS (Steam)"
platform="macOS"
runnable=true
custom_features="steam"
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/macos/Blockfall.zip"

[preset.1.options]

application/bundle_identifier="com.yourstudio.blockfall"
application/short_version="1.0.0"
application/version="1.0.0"
codesign/codesign="built-in"

[preset.2]

name="Linux (Steam)"
platform="Linux/X11"
runnable=true
custom_features="steam"
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/linux/Blockfall.x86_64"

[preset.2.options]

binary_format/architecture="x86_64"

[preset.3]

name="Android"
platform="Android"
runnable=true
export_filter="all_resources"
include_filter=""
exclude_filter=""
; gradle export_format=0 -> .apk (sideload/test). For the Play Store switch to
; export_format=1 + .aab + a RELEASE keystore (keystore/keystore_user/keystore_pass).
export_path="build/android/Blockfall.apk"

[preset.3.options]

package/unique_name="com.yourstudio.blockfall"
package/name="Blockfall"
version/code=1
version/name="1.0.0"
gradle_build/use_gradle_build=true
gradle_build/export_format=0
architectures/armeabi-v7a=false
architectures/arm64-v8a=true
architectures/x86_64=true
screen/immersive_mode=true
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
permissions/internet=true
permissions/access_network_state=true

; iOS 출시 프리셋 — 반드시 macOS + Xcode에서 내보내야 합니다 (./build-ios.sh 사용,
; 자세한 절차는 docs/IOS_RELEASE.md). export_project_only=true 이므로 Godot은
; Xcode 프로젝트를 생성하고, 서명/아카이브/업로드는 Xcode(자동 서명)가 맡습니다.
; app_store_team_id 는 Apple Developer 멤버십 페이지의 Team ID 로 채우세요
; (build-ios.sh --team XXXXXXXXXX 로도 주입 가능).
[preset.4]

name="iOS"
platform="iOS"
runnable=true
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/ios/Blockfall.ipa"

[preset.4.options]

application/app_store_team_id=""
application/bundle_identifier="com.blockfall.game"
application/short_version="1.0.0"
application/version="1.0.0"
application/name="Blockfall"
application/min_ios_version="12.0"
application/export_project_only=true
; 표준 암호화(HTTPS 등)만 사용 → 수출규정 면제. 업로드 때마다 묻는 질문을 건너뜀.
application/additional_plist_content="<key>ITSAppUsesNonExemptEncryption</key><false/>"
capabilities/access_wifi=true
orientation/portrait=true
; App Store 마케팅 아이콘(1024×1024, 알파 없음). 나머지 크기는 Godot이 자동 생성.
icons/app_store_1024x1024="res://assets/ios/icon_1024.png"

; ---------------------------------------------------------------------------
;  Plain desktop Linux build — NO "steam" feature, so PlatformHub selects the
;  NullPlatform backend and the game runs standalone (no Steam client needed).
;  Resources are embedded into the executable (embed_pck), so distribution is
;  the binary + its data_Blockfall_linuxbsd/ .NET assembly folder.
; ---------------------------------------------------------------------------
[preset.5]

name="Linux Desktop"
platform="Linux/X11"
runnable=true
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/linux-desktop/Blockfall.x86_64"

[preset.5.options]

binary_format/architecture="x86_64"
binary_format/embed_pck=true

; ---------------------------------------------------------------------------
;  Plain Windows desktop build — no "steam" feature (NullPlatform backend).
;  .exe with resources embedded; ships with its data_Blockfall_windows/ folder.
; ---------------------------------------------------------------------------
[preset.6]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/windows-desktop/Blockfall.exe"

[preset.6.options]

binary_format/architecture="x86_64"
binary_format/embed_pck=true
application/modify_resources=false
application/product_name="Blockfall"
application/company_name="Blockfall"
application/file_version="1.0.0.0"
application/product_version="1.0.0.0"

; ---------------------------------------------------------------------------
;  Plain macOS build — no "steam" feature. Unsigned (codesign disabled) so it
;  can be produced off a Mac; users right-click > Open to bypass Gatekeeper.
; ---------------------------------------------------------------------------
[preset.7]

name="macOS Desktop"
platform="macOS"
runnable=true
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/macos-desktop/Blockfall.zip"

[preset.7.options]

export/distribution_type=0
binary_format/architecture="universal"
application/bundle_identifier="com.blockfall.game"
application/short_version="1.0.0"
application/version="1.0.0"
codesign/codesign=0
notarization/notarization=0
