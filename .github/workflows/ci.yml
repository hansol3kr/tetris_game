name: CI

# Builds and tests the engine-agnostic core on every push/PR. The Godot game
# project is intentionally excluded here (it builds via the Godot toolchain in a
# separate export pipeline) so this job stays fast and dependency-light.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-tests:
    name: Core engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Blockfall.sln

      - name: Build
        run: dotnet build Blockfall.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Blockfall.sln --configuration Release --no-build --verbosity normal

  smoke:
    name: Headless autoplay smoke test
    runs-on: ubuntu-latest
    # Boots the REAL Godot game headless and drives it through every screen + a
    # full run, asserting no screen collapses to 0×0 and nothing throws (Dev.AutoPlay).
    # Runs in parallel with core-tests so the fast .NET-only path stays fast.
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache Godot 4.3 (.NET) editor
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-4.3-stable-mono-linux

      - name: Install Godot 4.3 (.NET) if not cached
        run: |
          set -e
          BIN="$HOME/godot/Godot_v4.3-stable_mono_linux.x86_64"
          if [ ! -x "$BIN" ]; then
            mkdir -p "$HOME/godot"
            curl -fL --retry 3 -o /tmp/godot.zip \
              https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_mono_linux_x86_64.zip
            unzip -q -o /tmp/godot.zip -d /tmp/gd
            cp -a /tmp/gd/*/. "$HOME/godot/"
            chmod +x "$BIN"
          fi
          echo "GODOT=$BIN" >> "$GITHUB_ENV"

      - name: Smoke test (build + autoplay, gated on exit code)
        run: ./run.sh --smoke
